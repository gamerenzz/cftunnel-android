name: Build Android APK

on:
  workflow_dispatch: # 支持手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 配置 Go 环境以编译 cloudflared
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 2. 编译并生成适用于 Android 的 libcloudflared.so
    - name: Compile cloudflared for Android ARM64
      run: |
        # 创建 Android 动态库目录
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # 临时克隆官方 cloudflared 仓库
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        cd cloudflared-src
        
        # 交叉编译
        echo "Starting compilation for Android ARM64..."
        CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        echo "Compilation completed. File size details:"
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 3. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. 授予 Gradle 执行权限
    - name: Grant execute permission for gradlew
      run: |
        # 如果本地仓库没有 gradlew，则用 gradle wrapper 生成
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    # 5. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 6. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
