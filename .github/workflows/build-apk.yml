name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 配置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 2. 安全重定向补丁：仅对 *.go 源码文件进行替换，规避汇编和预编译二进制文件污染
    - name: Patch Go DNS & Hosts Resolver for Android
      run: |
        GOROOT=$(go env GOROOT)
        echo "Go Root found at: $GOROOT"
        
        # 补丁 A：将 net 源码中所有硬编码的 /etc/resolv.conf 替换为 cftunnel 的绝对物理沙盒路径
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"/etc/resolv.conf"|"/data/data/com.qingchen.cftunnel/files/resolv.conf"|g' {} +
        
        # 补丁 B：将 net 源码中所有硬编码的 /etc/hosts 替换为 cftunnel 的绝对物理沙盒路径
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"/etc/hosts"|"/data/data/com.qingchen.cftunnel/files/hosts"|g' {} +
        
        # 补丁 C：强行将 net 源码中对 android 本身的系统规避检测置为 false，迫使 Go 像对待标准 Linux 一样读取配置文件
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|runtime.GOOS == "android"|false|g' {} +
        
        # 自动验证补丁是否注入成功
        echo "===== 自动验证补丁注入状态 ====="
        grep -rn "com.qingchen.cftunnel" $GOROOT/src/net/
        echo "=============================="

    # 3. 编译并生成适用于 Android 的 libcloudflared.so (引入 -a 强行重建所有标准库)
    - name: Compile cloudflared for Android ARM64 with CGO
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        cd cloudflared-src
        
        NDK_PATH=$ANDROID_NDK_LATEST_HOME
        echo "Using Android NDK Path: $NDK_PATH"
        
        CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android26-clang" | head -n 1)
        if [ -z "$CLANG_PATH" ]; then
          CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android*-clang" | head -n 1)
        fi
        
        echo "Using Cross Compiler CC: $CLANG_PATH"
        
        export CC=$CLANG_PATH
        export CGO_ENABLED=1
        export GOOS=android
        export GOARCH=arm64
        
        # 强行重构整套标准库 net 包
        echo "Starting forced complete rebuild (go build -a) for Android ARM64..."
        go build -a -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        echo "CGO & -a Compilation completed. File size details:"
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 4. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 5. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 6. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 7. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
