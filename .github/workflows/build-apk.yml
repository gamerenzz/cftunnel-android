name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 配置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 2. 核心补丁：使用 sudo 超级用户特权，强制重定向 GOROOT 中的 resolv.conf 和 hosts 路径，彻底绕开安卓软链接阻断
    - name: Patch Go DNS & Hosts Resolver for Android
      run: |
        GOROOT=$(go env GOROOT)
        echo "Go Root found at: $GOROOT"
        
        # 使用 sudo 强制获取系统最高权限，无视只读约束，强行对 *.go 源码完成绝对物理路径 /data/user/0/ 劫持
        sudo find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"/etc/resolv.conf"|"/data/user/0/com.qingchen.cftunnel/files/resolv.conf"|g' {} +
        sudo find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"/etc/hosts"|"/data/user/0/com.qingchen.cftunnel/files/hosts"|g' {} +
        sudo find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|runtime.GOOS == "android"|false|g' {} +
        
        # 自动验证补丁是否成功写入
        echo "===== 自动验证补丁注入状态 ====="
        grep -rn "com.qingchen.cftunnel" $GOROOT/src/net/
        echo "=============================="

    # 3. 使用 sudo -E 强制对 net 标准网络包进行安全重构 (确保保留安卓 CPU 编译环境变量，并写入系统缓存目录)
    - name: Force Rebuild Patched Go Net Package
      run: |
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        
        # -E 参数至关重要，用于在 sudo 提权时保留上面 export 的安卓交叉编译环境变量
        sudo -E go install -a net
        echo "Patched standard net package compiled and cached successfully!"

    # 4. 编译并生成 (纯 Go 静态编译，不再使用全局 -a，直接读取上面重构好的 net.a 缓存包)
    - name: Compile cloudflared for Android ARM64
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        cd cloudflared-src
        
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        
        echo "Starting pure Go static compilation for Android ARM64..."
        go build -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        echo "Pure Go static Compilation completed. File size details:"
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 5. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 6. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 7. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 8. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
