name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    # 1. 编译底层的 LD_PRELOAD 端口劫持神器 libhijack.so
    - name: Compile LD_PRELOAD DNS Hijacker
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        cat << 'EOF' > hijack.c
        #define _GNU_SOURCE
        #include <dlfcn.h>
        #include <sys/socket.h>
        #include <netinet/in.h>
        #include <arpa/inet.h>
        #include <string.h>

        typedef int (*orig_connect_func_type)(int sockfd, const struct sockaddr *addr, socklen_t addrlen);

        int connect(int sockfd, const struct sockaddr *addr, socklen_t addrlen) {
            orig_connect_func_type orig_connect;
            orig_connect = (orig_connect_func_type)dlsym(RTLD_NEXT, "connect");

            if (addr->sa_family == AF_INET) {
                struct sockaddr_in *sin = (struct sockaddr_in *)addr;
                if (ntohs(sin->sin_port) == 53) {
                    sin->sin_port = htons(53533);
                    sin->sin_addr.s_addr = inet_addr("127.0.0.1");
                }
            } else if (addr->sa_family == AF_INET6) {
                struct sockaddr_in6 *sin6 = (struct sockaddr_in6 *)addr;
                if (ntohs(sin6->sin6_port) == 53) {
                    struct sockaddr_in faked_ipv4;
                    memset(&faked_ipv4, 0, sizeof(faked_ipv4));
                    faked_ipv4.sin_family = AF_INET;
                    faked_ipv4.sin_port = htons(53533);
                    faked_ipv4.sin_addr.s_addr = inet_addr("127.0.0.1");
                    
                    return orig_connect(sockfd, (struct sockaddr *)&faked_ipv4, sizeof(faked_ipv4));
                }
            }
            return orig_connect(sockfd, addr, addrlen);
        }
        EOF

        NDK_PATH=$ANDROID_NDK_LATEST_HOME
        CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android26-clang" | head -n 1)
        if [ -z "$CLANG_PATH" ]; then
          CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android*-clang" | head -n 1)
        fi
        
        $CLANG_PATH -shared -fPIC -o app/src/main/jniLibs/arm64-v8a/libhijack.so hijack.c

    # 2. 编译并生成适用于 Android 的 libcloudflared.so
    - name: Compile cloudflared for Android ARM64
      run: |
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        
        # 注入 Go 全局高阶 DNS 拦截服务器
        cat << 'EOF' > cloudflared-src/cmd/cloudflared/dns_patch.go
        package main

        import (
            "os"
            "net"
            "strings"
        )

        func init() {
            go startLocalDNSServer()
        }

        func startLocalDNSServer() {
            addr, _ := net.ResolveUDPAddr("udp", "127.0.0.1:53533")
            conn, err := net.ListenUDP("udp", addr)
            if err != nil { return }
            defer conn.Close()

            buf := make([]byte, 1024)
            for {
                n, clientAddr, err := conn.ReadFromUDP(buf)
                if err != nil { continue }
                query := buf[:n]

                domain := parseDNSQueryDomain(query)
                preferredIP := os.Getenv("PREFERRED_IP")

                if preferredIP != "" && strings.Contains(domain, "argotunnel.com") {
                    qTypeOffset := n - 4
                    if qTypeOffset > 12 {
                        response := fakedDNSResponse(query, preferredIP)
                        conn.WriteToUDP(response, clientAddr)
                        continue
                    }
                }
                go forwardDNS(conn, clientAddr, query)
            }
        }

        func forwardDNS(localConn *net.UDPConn, clientAddr *net.UDPAddr, query []byte) {
            serverAddr, _ := net.ResolveUDPAddr("udp", "223.5.5.5:53")
            serverConn, err := net.DialUDP("udp", nil, serverAddr)
            if err != nil { return }
            defer serverConn.Close()

            serverConn.Write(query)
            respBuf := make([]byte, 1024)
            n, err := serverConn.Read(respBuf)
            if err != nil { return }

            localConn.WriteToUDP(respBuf[:n], clientAddr)
        }

        func parseDNSQueryDomain(query []byte) string {
            if len(query) < 12 { return "" }
            var domains []string
            offset := 12
            for {
                if offset >= len(query) { break }
                length := int(query[offset])
                if length == 0 { break }
                offset++
                if offset+length > len(query) { break }
                domains = append(domains, string(query[offset:offset+length]))
                offset += length
            }
            return strings.Join(domains, ".")
        }

        func fakedDNSResponse(query []byte, ipStr string) []byte {
            ip := net.ParseIP(ipStr).To4()
            if ip == nil { return query }
            resp := make([]byte, len(query))
            copy(resp, query)
            resp[2] = 0x81
            resp[3] = 0x80
            resp[6] = 0x00
            resp[7] = 0x01
            resp[8] = 0x00
            resp[9] = 0x00
            resp[10] = 0x00
            resp[11] = 0x00
            answer := []byte{
                0xc0, 0x0c, 0x00, 0x01, 0x00, 0x01, 0x00, 0x00, 0x00, 0x3c, 0x00, 0x04,
                ip[0], ip[1], ip[2], ip[3],
            }
            return append(resp, answer...)
        }
        EOF
        
        cd cloudflared-src
        
        # 核心修正：强行获取安卓 NDK 编译器的绝对路径，并将其导出至全局环境变量 CC 中
        # 这能确保 Go 在编译底层 ARM 汇编与 C 库时，使用正确的安卓编译器，从而彻底解决所有编译报错！
        NDK_PATH=$ANDROID_NDK_LATEST_HOME
        CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android26-clang" | head -n 1)
        if [ -z "$CLANG_PATH" ]; then
          CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android*-clang" | head -n 1)
        fi
        
        export CC=$CLANG_PATH
        export CXX="${CLANG_PATH}++"
        export CGO_ENABLED=1
        export GOOS=android
        export GOARCH=arm64
        
        echo "Starting CGO compilation for Android ARM64 with CC=$CC..."
        go build -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..

    # 3. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 5. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 6. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
