name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 配置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 2. 源码级双重劫持补丁：使用绝对物理路径 /data/user/0/ 进行劫持，彻底绕开安卓对 /data/data/ 软链接的沙盒拦截
    - name: Patch Go DNS & Hosts Resolver for Android
      run: |
        GOROOT=$(go env GOROOT)
        echo "Go Root found at: $GOROOT"
        
        # 补丁 A：将 net 源码中所有硬编码的 /etc/resolv.conf 替换为 cftunnel 的绝对物理真实路径
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"/etc/resolv.conf"|"/data/user/0/com.qingchen.cftunnel/files/resolv.conf"|g' {} +
        
        # 补丁 B：将 net 源码中所有硬编码的 /etc/hosts 替换为 cftunnel 的绝对物理真实路径
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"/etc/hosts"|"/data/user/0/com.qingchen.cftunnel/files/hosts"|g' {} +
        
        # 补丁 C：强行将 net 源码中对 android 本身的系统规避检测置为 false，迫使 Go 像对待标准 Linux 一样读取配置文件
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|runtime.GOOS == "android"|false|g' {} +
        
        # 自动验证补丁是否注入成功
        echo "===== 自动验证补丁注入状态 ====="
        grep -rn "com.qingchen.cftunnel" $GOROOT/src/net/
        echo "=============================="

    # 3. 强行且仅对 net 标准网络包进行安全重构（绝对安全，编译极速，完美封锁劫持路径）
    - name: Force Rebuild Patched Go Net Package
      run: |
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        # 强制且仅重新编译并缓存标准 net 包，绝对不碰敏感的 runtime 核心
        go install -a net
        echo "Patched standard net package compiled and cached successfully!"

    # 4. 编译并生成（纯 Go 静态编译，不再使用危险的全局 -a，直接读取上面重构好的 net 缓存包）
    - name: Compile cloudflared for Android ARM64
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        cd cloudflared-src
        
        # 纯 Go 静态编译，完全脱离 NDK，不引入任何系统 C 符号冲突
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        
        echo "Starting pure Go static compilation for Android ARM64..."
        go build -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        echo "Pure Go static Compilation completed. File size details:"
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 5. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 6. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 7. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 8. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
