name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 配置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 2. 核心代码注入：直接向 cloudflared 的入口 main 包中注入自定义 DNS 拨号器
    - name: Inject DNS Code-Patch to cloudflared
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        
        cat << 'EOF' > cloudflared-src/cmd/cloudflared/dns_patch.go
        package main

        import (
            "context"
            "net"
        )

        func init() {
            // 强行把 Go 全局默认 DNS 解析器重定向到阿里公共 DNS，完全绕过系统沙盒和 resolv.conf 限制
            net.DefaultResolver = &net.Resolver{
                PreferGo: true,
                Dial: func(ctx context.Context, network, address string) (net.Conn, error) {
                    var d net.Dialer
                    return d.DialContext(ctx, "udp", "223.5.5.5:53")
                },
            }
        }
        EOF
        echo "DNS code injection completed!"

    # 3. 编译并生成（强制开启 CGO_ENABLED=1，并使用 NDK 交叉编译器，走安卓系统 2026 证书校验通道）
    - name: Compile cloudflared for Android ARM64 with CGO
      run: |
        cd cloudflared-src
        
        # 定位 GitHub Action 宿主机上的 Android NDK 路径
        NDK_PATH=$ANDROID_NDK_LATEST_HOME
        echo "Using Android NDK Path: $NDK_PATH"
        
        # 寻找适用于 Android ARM64 (API 26) 的交叉编译器 Clang
        CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android26-clang" | head -n 1)
        if [ -z "$CLANG_PATH" ]; then
          CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android*-clang" | head -n 1)
        fi
        
        echo "Using Cross Compiler CC: $CLANG_PATH"
        
        export CC=$CLANG_PATH
        export CGO_ENABLED=1 # 强制开启 CGO
        export GOOS=android
        export GOARCH=arm64
        
        # 引入 -a 强行重构整套标准库
        echo "Starting CGO & -a complete rebuild for Android ARM64..."
        go build -a -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        echo "Compilation completed. File size details:"
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 4. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 5. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 6. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 7. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
