name: Build Android APK

on:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 配置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 2. 编译并生成适用于 Android 的 libcloudflared.so (注入全局自主 DNS 解析)
    - name: Compile cloudflared for Android ARM64
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        
        # 核心注入点：直接向 cloudflared 的入口 main 包中注入自定义 DNS 拨号器
        cat << 'EOF' > cloudflared-src/cmd/cloudflared/dns_patch.go
        package main

        import (
            "context"
            "net"
        )

        func init() {
            // 强制接管 Go 网络库的全局解析器，将其网络请求硬性重定向到阿里公共 DNS
            // 这将彻底绕过 Android 10+ 对 resolv.conf 的封锁以及 Bionic 库不支持 SRV 记录的硬伤
            net.DefaultResolver = &net.Resolver{
                PreferGo: true,
                Dial: func(ctx context.Context, network, address string) (net.Conn, error) {
                    var d net.Dialer
                    return d.DialContext(ctx, "udp", "223.5.5.5:53")
                },
            }
        }
        EOF
        
        cd cloudflared-src
        
        # 启用 CGO_ENABLED=0 (纯 Go 静态编译)，编译速度极快且 100% 稳定
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        
        echo "Starting pure Go compilation with DNS Code-Injection for Android ARM64..."
        go build -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        echo "Compilation completed. File size details:"
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 3. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 5. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 6. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
