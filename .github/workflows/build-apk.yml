name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Patch Go DNS Resolver Fallbacks for Android
      run: |
        GOROOT=$(go env GOROOT)
        echo "Go Root found at: $GOROOT"
        
        sudo chown -R runner:runner $GOROOT
        
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"127.0.0.1:53"|"127.0.0.1:53533"|g' {} +
        find $GOROOT/src/net/ -type f -name "*.go" -exec sed -i 's|"[::1]:53"|"127.0.0.1:53533"|g' {} +
        
        echo "===== 自动验证补丁注入状态 ====="
        grep -rn "127.0.0.1:53533" $GOROOT/src/net/
        echo "=============================="

    - name: Force Rebuild Patched Go Net Package
      run: |
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        
        go install -a net
        echo "Patched standard net package compiled and cached successfully!"

    - name: Compile cloudflared for Android ARM64
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        git clone --depth 1 https://github.com/cloudflare/cloudflared.git cloudflared-src
        
        # 终极高阶 DNS 拦截服务端：全类型查询拦截与响应伪造
        cat << 'EOF' > cloudflared-src/cmd/cloudflared/dns_patch.go
        package main

        import (
            "context"
            "net"
            "os"
            "strings"
        )

        func init() {
            go startLocalDNSServer()

            net.DefaultResolver = &net.Resolver{
                PreferGo: true,
                Dial: func(ctx context.Context, network, address string) (net.Conn, error) {
                    var d net.Dialer
                    return d.DialContext(ctx, "udp", "127.0.0.1:53533")
                },
            }
        }

        func startLocalDNSServer() {
            addr, err := net.ResolveUDPAddr("udp", "127.0.0.1:53533")
            if err != nil {
                return
            }
            conn, err := net.ListenUDP("udp", addr)
            if err != nil {
                return
            }
            defer conn.Close()

            buf := make([]byte, 1024)
            for {
                n, clientAddr, err := conn.ReadFromUDP(buf)
                if err != nil {
                    continue
                }
                query := buf[:n]

                domain := parseDNSQueryDomain(query)
                preferredIP := os.Getenv("PREFERRED_IP")

                // 如果启用了优选 IP，且当前查询是 Cloudflare 穿透核心域名
                if preferredIP != "" && strings.Contains(domain, "argotunnel.com") {
                    
                    qTypeOffset := n - 4
                    if qTypeOffset > 12 {
                        // 无论内核请求的是 A(1), AAAA(28), 还是 SRV(33)，我们统统拦截！
                        // 强行向内核伪造并返回一个 A 记录响应包，把内核彻底锁死在我们的优选 IP 上！
                        response := fakedDNSResponse(query, preferredIP)
                        conn.WriteToUDP(response, clientAddr)
                        continue
                    }
                }

                // 常规请求或免域名注册请求，放行给 114
                go forwardDNS(conn, clientAddr, query)
            }
        }

        func forwardDNS(localConn *net.UDPConn, clientAddr *net.UDPAddr, query []byte) {
            serverAddr, err := net.ResolveUDPAddr("udp", "114.114.114.114:53")
            if err != nil {
                return
            }
            serverConn, err := net.DialUDP("udp", nil, serverAddr)
            if err != nil {
                return
            }
            defer serverConn.Close()

            _, err = serverConn.Write(query)
            if err != nil {
                return
            }

            respBuf := make([]byte, 1024)
            n, err := serverConn.Read(respBuf)
            if err != nil {
                return
            }

            localConn.WriteToUDP(respBuf[:n], clientAddr)
        }

        func parseDNSQueryDomain(query []byte) string {
            if len(query) < 12 {
                return ""
            }
            var domains []string
            offset := 12
            for {
                if offset >= len(query) {
                    break
                }
                length := int(query[offset])
                if length == 0 {
                    break
                }
                offset++
                if offset+length > len(query) {
                    break
                }
                domains = append(domains, string(query[offset:offset+length]))
                offset += length
            }
            return strings.Join(domains, ".")
        }

        func fakedDNSResponse(query []byte, ipStr string) []byte {
            ip := net.ParseIP(ipStr).To4()
            if ip == nil {
                return query
            }

            resp := make([]byte, len(query))
            copy(resp, query)

            // Flags: 响应成功 (0x8180)
            resp[2] = 0x81
            resp[3] = 0x80
            // Answer RRs 数量
            resp[6] = 0x00
            resp[7] = 0x01
            // Authority RRs = 0
            resp[8] = 0x00
            resp[9] = 0x00
            // Additional RRs = 0
            resp[10] = 0x00
            resp[11] = 0x00

            // 构造强硬的 A 记录 Answer
            answer := []byte{
                0xc0, 0x0c,                 // 域名指针指向请求
                0x00, 0x01,                 // Type: A
                0x00, 0x01,                 // Class: IN
                0x00, 0x00, 0x00, 0x3c,     // TTL: 60s
                0x00, 0x04,                 // Length: 4 bytes
                ip[0], ip[1], ip[2], ip[3], // 注入的优选 IP
            }

            return append(resp, answer...)
        }
        EOF
        
        # 将 go.mod 降级与剥离工具链拦截
        sed -i 's|^go 1\.[0-9]\+|go 1.22|g' cloudflared-src/go.mod
        sed -i '/^toolchain/d' cloudflared-src/go.mod
        
        # 降级所有 vendor 依赖树
        if [ -d "cloudflared-src/vendor" ]; then
          echo "Found local vendor cache. Applying dependency downgrades..."
          sed -i 's|go 1\.26|go 1.22|g' cloudflared-src/vendor/modules.txt
          sed -i 's|go 1\.25|go 1.22|g' cloudflared-src/vendor/modules.txt
          sed -i 's|go 1\.24|go 1.22|g' cloudflared-src/vendor/modules.txt
          sed -i 's|go 1\.23|go 1.22|g' cloudflared-src/vendor/modules.txt
          find cloudflared-src/vendor/ -name "go.mod" -exec sed -i 's|^go 1\.[0-9]\+|go 1.22|g' {} +
        fi
        
        cd cloudflared-src
        export CGO_ENABLED=0
        export GOOS=android
        export GOARCH=arm64
        
        export GOTOOLCHAIN=local
        mkdir -p /tmp/go-clean-cache
        export GOCACHE=/tmp/go-clean-cache
        
        echo "Starting pure Go static compilation with Clean-GOCACHE, Local-Toolchain and Dependency-Downgrade..."
        go build -ldflags="-s -w" -o ../app/src/main/jniLibs/arm64-v8a/libcloudflared.so github.com/cloudflare/cloudflared/cmd/cloudflared
        
        cd ..
        ls -lh app/src/main/jniLibs/arm64-v8a/libcloudflared.so

    # 5. 配置 Java 运行环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 6. 强制生成兼容的 Gradle 8.5 包装器并授予执行权限
    - name: Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5 --distribution-type bin
        fi
        chmod +x gradlew

    # 7. 执行打包命令
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 8. 将 APK 作为 Artifact 上传，供用户下载
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: cftunnel-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
